<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Register Test - GEOVALUATOR</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: Arial, sans-serif; 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container { 
            background: white; 
            padding: 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 100%;
        }
        h1 { color: #667eea; margin-bottom: 10px; }
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .tabs button { 
            padding: 10px 20px; 
            border: none; 
            background: #e0e0e0; 
            color: #333;
            cursor: pointer; 
            border-radius: 6px 6px 0 0;
            font-weight: bold;
        }
        .tabs button.active { background: #667eea; color: white; }
        .form-section { display: none; }
        .form-section.active { display: block; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; color: #333; }
        .form-group input { 
            width: 100%; 
            padding: 12px; 
            border: 2px solid #ddd; 
            border-radius: 6px;
            font-size: 14px;
        }
        .form-group input:focus { border-color: #667eea; outline: none; }
        .btn { 
            width: 100%; 
            padding: 14px; 
            background: #667eea; 
            color: white; 
            border: none; 
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }
        .btn:hover { background: #5568d3; }
        .btn:disabled { background: #ccc; cursor: not-allowed; }
        .message { 
            padding: 12px; 
            margin-top: 20px; 
            border-radius: 6px;
            text-align: center;
            font-weight: bold;
        }
        .message.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .message.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .user-info { 
            margin-top: 20px; 
            padding: 15px; 
            background: #f9f9f9; 
            border-radius: 6px;
            border-left: 4px solid #667eea;
        }
        .user-info h3 { color: #667eea; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🌍 GEOVALUATOR</h1>
        <p style="color: #666; margin-bottom: 30px;">Login & Registration Test</p>
        
        <div class="tabs">
            <button onclick="showTab('login')" class="active" id="tab-login">Login</button>
            <button onclick="showTab('register')" id="tab-register">Register</button>
        </div>

        <!-- Login Form -->
        <div id="login" class="form-section active">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="Enter password">
            </div>
            <button class="btn" onclick="handleLogin()">Login</button>
        </div>

        <!-- Register Form -->
        <div id="register" class="form-section">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="register-name" placeholder="John Doe">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="register-email" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label>Phone</label>
                <input type="tel" id="register-phone" placeholder="1234567890">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="register-password" placeholder="Min 6 characters">
            </div>
            <button class="btn" onclick="handleRegister()">Register</button>
        </div>

        <!-- OTP Verification (hidden initially) -->
        <div id="otp-section" class="form-section">
            <div class="form-group">
                <label>Enter OTP (Check console for OTP)</label>
                <input type="text" id="otp-code" placeholder="6-digit code">
            </div>
            <button class="btn" onclick="handleVerifyOTP()">Verify OTP</button>
        </div>

        <div id="message"></div>
        <div id="user-info" class="user-info" style="display: none;"></div>
    </div>

    <script>
        let currentUserId = null;

        function showTab(tab) {
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tabs button').forEach(b => b.classList.remove('active'));
            document.getElementById(tab).classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
            clearMessage();
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.className = `message ${type}`;
            msg.textContent = text;
        }

        function clearMessage() {
            document.getElementById('message').innerHTML = '';
        }

        async function handleLogin() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            if (!email || !password) {
                showMessage('Please fill in all fields', 'error');
                return;
            }

            try {
                const response = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();
                console.log('Login response:', data);

                if (data.success || data.token) {
                    showMessage('Login successful!', 'success');
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    displayUserInfo(data.user);
                } else {
                    showMessage(data.error || 'Login failed', 'error');
                }
            } catch (error) {
                showMessage('Login error: ' + error.message, 'error');
                console.error('Login error:', error);
            }
        }

        async function handleRegister() {
            const name = document.getElementById('register-name').value;
            const email = document.getElementById('register-email').value;
            const phone = document.getElementById('register-phone').value;
            const password = document.getElementById('register-password').value;

            if (!name || !email || !password) {
                showMessage('Please fill in all required fields', 'error');
                return;
            }

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, phone, password })
                });

                const data = await response.json();
                console.log('Register response:', data);

                if (data.success && data.requiresVerification) {
                    currentUserId = data.userId;
                    showMessage('Registration successful! Check console for OTP code.', 'success');
                    showTab('otp-section');
                    document.getElementById('otp-section').classList.add('active');
                } else if (data.error) {
                    showMessage(data.error, 'error');
                } else {
                    showMessage('Registration failed', 'error');
                }
            } catch (error) {
                showMessage('Registration error: ' + error.message, 'error');
                console.error('Registration error:', error);
            }
        }

        async function handleVerifyOTP() {
            const otp = document.getElementById('otp-code').value;

            if (!otp || !currentUserId) {
                showMessage('Please enter OTP', 'error');
                return;
            }

            try {
                const response = await fetch('/api/auth/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userId: currentUserId, otp })
                });

                const data = await response.json();
                console.log('Verify OTP response:', data);

                if (data.success) {
                    showMessage('Verification successful! You can now login.', 'success');
                    localStorage.setItem('authToken', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    displayUserInfo(data.user);
                    setTimeout(() => showTab('login'), 2000);
                } else {
                    showMessage(data.error || 'Verification failed', 'error');
                }
            } catch (error) {
                showMessage('Verification error: ' + error.message, 'error');
                console.error('Verification error:', error);
            }
        }

        function displayUserInfo(user) {
            const userInfoDiv = document.getElementById('user-info');
            userInfoDiv.style.display = 'block';
            userInfoDiv.innerHTML = `
                <h3>Logged In User</h3>
                <p><strong>Name:</strong> ${user.name}</p>
                <p><strong>Email:</strong> ${user.email}</p>
                <p><strong>ID:</strong> ${user.id}</p>
                <button class="btn" style="margin-top: 10px;" onclick="logout()">Logout</button>
            `;
        }

        function logout() {
            localStorage.removeItem('authToken');
            localStorage.removeItem('user');
            document.getElementById('user-info').style.display = 'none';
            showMessage('Logged out successfully', 'success');
            showTab('login');
        }

        // Check if already logged in
        window.addEventListener('load', () => {
            const user = localStorage.getItem('user');
            if (user) {
                displayUserInfo(JSON.parse(user));
            }
        });
    </script>
</body>
</html>
