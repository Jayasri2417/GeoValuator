services:
  # Node.js Express Server
  - type: web
    name: geovaluator-backend
    env: node
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: PYTHON_AI_ENGINE_URL
        value: http://geovaluator-ai-engine:10000
      - key: MONGO_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      # Expose MONGO_URI and GEMINI_API_KEY as placeholders or explicit
      - key: ALLOWED_ORIGINS
        value: "https://geovaluator.vercel.app,https://your-vercel-domain.vercel.app"
        # The user's frontend domain. Since we don't know the exact vercel domain from the json, we can leave it flexible or the backend will auto-allow CORS when origin matches. 
        # Actually in index.js allowedOrigins handles CORS.

  # Python AI Engine
  - type: web
    name: geovaluator-ai-engine
    env: python
    rootDir: ai_engine
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port 10000
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.12
